name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v1

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtualenv and install deps
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin pytest pytest-asyncio ruff

      - name: Build bindings
        working-directory: bindings/python
        run: |
          source ${{ github.workspace }}/.venv/bin/activate
          maturin develop --all-features

      - name: Ruff lint
        run: |
          source .venv/bin/activate
          ruff check bindings/python/python/ examples/

      - name: Ruff format check
        run: |
          source .venv/bin/activate
          ruff format --check bindings/python/python/ examples/

      - name: Pytest
        working-directory: bindings/python
        run: |
          source ${{ github.workspace }}/.venv/bin/activate
          pytest tests/ -v

      - name: Run examples
        run: |
          source .venv/bin/activate
          python examples/crash_recovery.py
          python examples/langgraph_integration.py
          python examples/openai_agents_integration.py
          python examples/crewai_integration.py
